services:
  agentrail:
    build: .
    environment:
      AGENTRAIL_HOST: 0.0.0.0
      AGENTRAIL_PORT: 3000
      AGENTRAIL_PUBLIC_BASE_URL: http://127.0.0.1:3000
      AGENTRAIL_EVENT_STORE_PATH: /data/task-events.jsonl
      AGENTRAIL_TASK_SOURCES: "{}"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "3000:3000"
    volumes:
      - agentrail-event-data:/data

volumes:
  agentrail-event-data:
