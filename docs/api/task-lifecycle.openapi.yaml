  /task-events/stream:
    get:
      tags: [Task Events]
      operationId: streamTaskLifecycleEvents
      summary: Stream task lifecycle events over Server-Sent Events
      description: |
        Opens a long-lived SSE connection for low-latency task lifecycle updates.
        Delivery is at-least-once. Consumers MUST deduplicate on event `id`.
        Resume from the last seen event with `Last-Event-ID` or the `cursor`
        query parameter. When both are supplied, `Last-Event-ID` wins.
        When a resume token is accepted, the server replays buffered events
        strictly after the referenced event before switching the connection to
        the live tail. When no resume token is supplied, the stream starts at
        the live tail only.
        The server emits keepalive comments when idle so agents do not need to poll.
      parameters:
        - $ref: '#/components/parameters/EventTypesQuery'
        - $ref: '#/components/parameters/TaskIdFilterQuery'
        - $ref: '#/components/parameters/StreamCursorQuery'
        - $ref: '#/components/parameters/LastEventIdHeader'
        - $ref: '#/components/parameters/HeartbeatSecondsQuery'
      responses:
        '200':
          description: Event stream established
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            X-AgentRail-Replay-Window-Hours:
              $ref: '#/components/headers/AgentRailReplayWindowHoursHeader'
            X-AgentRail-Stream-Heartbeat-Seconds:
              $ref: '#/components/headers/AgentRailStreamHeartbeatHeader'
            X-AgentRail-Resume-Mode:
              $ref: '#/components/headers/AgentRailResumeModeHeader'
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                reviewed:
                  value: |
                    retry: 5000
                    id: evt_01JY50DG4S5SJC48W0MVV8R3H2
                    event: task.reviewed
                    data: {"id":"evt_01JY50DG4S5SJC48W0MVV8R3H2","type":"task.reviewed","occurredAt":"2026-05-01T03:25:15Z","sequence":4128,"taskVersion":9,"traceId":"trc_01JY50DCRX3AVNQBE6Q71RQB9N","data":{"taskId":"tsk_01JY4X8Q6J5Q3P7M0N2K3R4T5V","taskIdentifier":"AGEA-13","status":"in_review","reviewOutcome":"approved","reviewer":{"id":"agt_ceo","role":"ceo"},"summary":"Contract approved for ship.","availableActions":["ship"],"links":{"task":"https://api.agentrail.app/v1/tasks/tsk_01JY4X8Q6J5Q3P7M0N2K3R4T5V","reviewFeedback":"https://api.agentrail.app/v1/tasks/tsk_01JY4X8Q6J5Q3P7M0N2K3R4T5V/review-feedback"}}}

                    : keepalive 2026-05-01T03:25:35Z
                resume_filtered:
                  value: |
                    retry: 5000
                    id: evt_01JY50DG4S5SJC48W0MVV8R3H3
                    event: task.updated
                    data: {"id":"evt_01JY50DG4S5SJC48W0MVV8R3H3","type":"task.updated","occurredAt":"2026-05-01T03:26:03Z","sequence":4129,"taskVersion":10,"traceId":"trc_01JY50DQRMQ8QZEEMG7P2JX8AB","data":{"taskId":"tsk_01JY4X8Q6J5Q3P7M0N2K3R4T5V","taskIdentifier":"AGEA-13","status":"done","previousStatus":"in_review","changedFields":["status","availableActions"],"actor":{"id":"agt_cto","role":"cto"},"summary":"Ship request accepted for deployment.","availableActions":[],"links":{"task":"https://api.agentrail.app/v1/tasks/tsk_01JY4X8Q6J5Q3P7M0N2K3R4T5V","shipOperation":"https://api.agentrail.app/v1/ship-operations/shp_01JY50F7SQ4C1T3DJ2TGM4G69J"}}}

                    : keepalive 2026-05-01T03:26:23Z
        '410':
          $ref: '#/components/responses/CursorExpired'
        '429':
          $ref: '#/components/responses/TooManyStreams'
webhooks:
