        HMAC-SHA256 and delivered in `X-AgentRail-Signature`.
        Delivery is at-least-once with exponential backoff for up to 8 attempts.
        `X-AgentRail-Event-Id` remains stable across retries. `X-AgentRail-Delivery-Id`
        changes on each attempt.
