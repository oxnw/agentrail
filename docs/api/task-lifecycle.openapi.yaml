          type: [string, 'null']
          format: uri
        ciStatus:
          type: [string, 'null']
          format: uri
        shipOperation:
          type: [string, 'null']
          format: uri
    TaskUpdatedEventData:
      type: object
      additionalProperties: false
      required:
        - taskId
        - taskIdentifier
        - status
        - previousStatus
        - changedFields
        - actor
        - summary
        - availableActions
        - links
      properties:
        taskId:
          type: string
        taskIdentifier:
          type: string
        status:
          type: string
          enum: [todo, in_progress, in_review, blocked, done, cancelled]
        previousStatus:
          type: [string, 'null']
          enum: [todo, in_progress, in_review, blocked, done, cancelled, null]
          description: |
            Previous task status before this update. `null` means the task
            entered the lifecycle without a prior status, including newly
            assigned tasks. AgentRail does not emit a separate `task.created`
            event in v0.3.
        changedFields:
          type: array
          minItems: 1
          maxItems: 20
