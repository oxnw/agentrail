                        title: Implement GitHub adapter error mapping
                        status: todo
                        priority: high
                        dueAt: '2026-05-02T18:00:00Z'
                        updatedAt: '2026-05-01T01:22:11Z'
                        availableActions: [start]
                        blocker: null
                    page:
                      nextCursor: eyJvZmZzZXQiOjI1fQ
