        - $ref: '#/components/parameters/AgentRailSubscriptionIdHeader'
        - $ref: '#/components/parameters/AgentRailEventIdHeader'
        - $ref: '#/components/parameters/AgentRailEventTypeHeader'
        - $ref: '#/components/parameters/AgentRailDeliveryIdHeader'
        - $ref: '#/components/parameters/AgentRailDeliveryAttemptHeader'
        - $ref: '#/components/parameters/AgentRailSignatureHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskLifecycleEventEnvelope'
            examples:
              task_updated:
                value:
                  id: evt_01JY50A13CW2JNEQR3MYXSGQQQ
                  type: task.updated
                  occurredAt: '2026-05-01T03:21:04Z'
