    TaskUpdatedEvent:
      type: object
      additionalProperties: false
      required: [id, type, occurredAt, sequence, taskVersion, data]
      properties:
        id:
          type: string
        type:
          type: string
          const: task.updated
        occurredAt:
          type: string
          format: date-time
        sequence:
          type: integer
          minimum: 1
          description: |
            Global monotonic sequence within the task lifecycle outbox, shared
            by webhook delivery and SSE replay cursors. It is not the task-local
            ordering key; use `taskVersion` for per-task ordering.
        taskVersion:
          type: integer
          minimum: 1
          description: Monotonic per-task version after the state mutation was applied.
        traceId:
          type: [string, 'null']
        data:
          $ref: '#/components/schemas/TaskUpdatedEventData'
    TaskAwaitingUserEvent:
      type: object
      additionalProperties: false
      required: [id, type, occurredAt, sequence, taskVersion, data]
      properties:
        id:
          type: string
        type:
          type: string
          const: task.awaiting_user
        occurredAt:
          type: string
          format: date-time
        sequence:
          type: integer
          minimum: 1
          description: |
            Global monotonic sequence within the task lifecycle outbox, shared
            by webhook delivery and SSE replay cursors. It is not the task-local
            ordering key; use `taskVersion` for per-task ordering.
        taskVersion:
          type: integer
          minimum: 1
        traceId:
          type: [string, 'null']
        data:
          $ref: '#/components/schemas/TaskAwaitingUserEventData'
    TaskReviewedEvent:
      type: object
      additionalProperties: false
      required: [id, type, occurredAt, sequence, taskVersion, data]
      properties:
        id:
          type: string
        type:
          type: string
          const: task.reviewed
        occurredAt:
          type: string
          format: date-time
        sequence:
          type: integer
          minimum: 1
          description: |
            Global monotonic sequence within the task lifecycle outbox, shared
            by webhook delivery and SSE replay cursors. It is not the task-local
            ordering key; use `taskVersion` for per-task ordering.
        taskVersion:
          type: integer
          minimum: 1
        traceId:
          type: [string, 'null']
        data:
          $ref: '#/components/schemas/TaskReviewedEventData'
    TaskShippedEvent:
      type: object
      additionalProperties: false
      required: [id, type, occurredAt, sequence, taskVersion, data]
      properties:
        id:
          type: string
        type:
          type: string
          const: task.shipped
        occurredAt:
          type: string
          format: date-time
        sequence:
          type: integer
          minimum: 1
          description: |
            Global monotonic sequence within the task lifecycle outbox, shared
            by webhook delivery and SSE replay cursors. It is not the task-local
            ordering key; use `taskVersion` for per-task ordering.
        taskVersion:
          type: integer
          minimum: 1
        traceId:
          type: [string, 'null']
        data:
          $ref: '#/components/schemas/TaskShippedEventData'
    TaskLifecycleEventEnvelope:
      oneOf:
        - $ref: '#/components/schemas/TaskUpdatedEvent'
        - $ref: '#/components/schemas/TaskAwaitingUserEvent'
        - $ref: '#/components/schemas/TaskReviewedEvent'
        - $ref: '#/components/schemas/TaskShippedEvent'
      discriminator:
        propertyName: type
        mapping:
          task.updated: '#/components/schemas/TaskUpdatedEvent'
          task.awaiting_user: '#/components/schemas/TaskAwaitingUserEvent'
          task.reviewed: '#/components/schemas/TaskReviewedEvent'
          task.shipped: '#/components/schemas/TaskShippedEvent'
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, details]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    AvailableActions:
      type: array
