components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Agent API key
  parameters:
    AgentApiKeyIdPath:
      in: path
      name: keyId
      required: true
      schema:
        type: string
        pattern: '^akey_[A-Za-z0-9]+$'
      description: Stable agent API key ID. This is not the secret key material.
    TaskIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^tsk_[A-Za-z0-9]+$'
      description: Stable task ID
    EventSubscriptionIdPath:
      in: path
      name: subscriptionId
      required: true
      schema:
        type: string
        pattern: '^evsub_[A-Za-z0-9]+$'
      description: Stable event subscription ID
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: |
        Unique key for safe retries of mutating operations.
        Same key plus same payload must replay the original accepted result.
        Same key plus different payload must return `409 conflict`.
    EventTypesQuery:
      in: query
      name: eventTypes
      required: false
      style: form
      explode: false
      schema:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          $ref: '#/components/schemas/TaskEventType'
      description: Optional comma-separated event type filter.
    TaskIdFilterQuery:
      in: query
      name: taskId
      required: false
      schema:
        type: string
        pattern: '^tsk_[A-Za-z0-9]+$'
      description: Optional filter to stream events for one task only.
    StreamCursorQuery:
      in: query
      name: cursor
      required: false
      schema:
        type: string
      description: |
        Opaque cursor or last event ID used to resume a disconnected stream.
        The server replays buffered events strictly after the referenced event
        within the active filter set, then switches to the live tail.
    LastEventIdHeader:
      in: header
      name: Last-Event-ID
      required: false
      schema:
        type: string
      description: |
        Standard SSE resume header. Overrides the `cursor` query parameter when
        both are supplied. Uses the same replay-then-live semantics as `cursor`.
    HeartbeatSecondsQuery:
      in: query
      name: heartbeatSeconds
      required: false
      schema:
        type: integer
        minimum: 10
        maximum: 60
        default: 20
      description: Idle keepalive cadence for the SSE stream.
    AgentRailSubscriptionIdHeader:
      in: header
      name: X-AgentRail-Subscription-Id
      required: true
      schema:
        type: string
        pattern: '^evsub_[A-Za-z0-9]+$'
      description: The event subscription that triggered the delivery.
    AgentRailEventIdHeader:
      in: header
      name: X-AgentRail-Event-Id
      required: true
      schema:
        type: string
        pattern: '^evt_[A-Za-z0-9]+$'
      description: Stable logical event ID. Deduplicate on this value.
    AgentRailEventTypeHeader:
      in: header
      name: X-AgentRail-Event-Type
      required: true
      schema:
        $ref: '#/components/schemas/TaskEventType'
      description: The task lifecycle event type.
    AgentRailDeliveryIdHeader:
      in: header
      name: X-AgentRail-Delivery-Id
      required: true
      schema:
        type: string
        pattern: '^dlv_[A-Za-z0-9]+$'
      description: Unique delivery attempt ID.
    AgentRailDeliveryAttemptHeader:
      in: header
      name: X-AgentRail-Delivery-Attempt
      required: true
      schema:
        type: integer
        minimum: 1
      description: Monotonic retry attempt number for this delivery.
    AgentRailSignatureHeader:
      in: header
      name: X-AgentRail-Signature
      required: true
      schema:
        type: string
        pattern: '^sha256=[A-Fa-f0-9]{64}$'
      description: HMAC-SHA256 signature of the raw request body using the subscription secret.
  headers:
    CacheControlNoStore:
      required: true
      schema:
        type: string
        const: no-store
      description: SSE responses are never cacheable.
    AgentRailReplayWindowHoursHeader:
      required: true
      schema:
        type: integer
        const: 72
      description: Retention window for resumable replay.
    AgentRailStreamHeartbeatHeader:
      required: true
      schema:
        type: integer
        minimum: 10
        maximum: 60
      description: Effective keepalive cadence for this stream connection.
    AgentRailResumeModeHeader:
      required: true
      schema:
        type: string
        enum: [live, replay_then_live]
      description: Whether the server started at the live tail or after replaying buffered events.
  responses:
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: unauthorized
                  message: Authentication failed.
                  details:
                    availableActions: [reauthenticate]
    InsufficientScope:
      description: Agent API key is valid but lacks the required scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: insufficient_scope
                  message: Agent API key does not grant the required scope.
                  details:
                    requiredScope: webhooks:write
                    grantedScopes: ['ci:read']
                    availableActions: [request_scope]
    RateLimited:
      description: Agent API key exceeded its fixed-window request budget
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
          description: Number of seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: rate_limited
                  message: Rate limit exceeded for this agent key.
                  details:
                    limit:
                      windowSeconds: 60
                      maxRequests: 600
                    remaining: 0
                    resetAt: '2026-05-01T04:33:00Z'
                    retryAfterSeconds: 12
                    availableActions: [retry]
    NotFound:
      description: Task or subscription not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: not_found
                  message: Resource not found.
                  details:
                    availableActions: [list_my_tasks]
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: validation_error
                  message: Invalid request payload.
                  details:
                    fieldErrors:
                      - field: expectedHeadSha
                        reason: must be a 40-char commit SHA
                    availableActions: [retry]
    Forbidden:
      description: Authenticated key does not have access to this resource or operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: forbidden
                  message: Task is not assigned to this agent.
                  details:
                    availableActions: [list_my_tasks]
    Conflict:
      description: Request conflicts with current resource state or idempotency history
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            idempotency_mismatch:
              value:
                error:
                  code: conflict
                  message: Idempotency-Key has already been used with a different request payload.
                  details:
                    availableActions: [retry]
    CursorExpired:
      description: Resume cursor is outside the replay window
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: cursor_expired
                  message: The requested stream cursor is no longer available.
                  details:
                    replayWindowHours: 72
                    availableActions: [reconnect_without_cursor]
    TooManyStreams:
      description: Concurrent stream limit reached
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
          description: Number of seconds to wait before retrying the stream connection.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: rate_limited
                  message: Concurrent stream limit reached for this agent token.
                  details:
                    concurrentLimit: 3
                    retryAfterSeconds: 15
                    availableActions: [retry]
  schemas:
    AgentApiKeyCreateRequest:
      type: object
      additionalProperties: false
      required: [agent, scopes, rateLimit]
      properties:
        agent:
          $ref: '#/components/schemas/AgentIdentity'
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/AgentAuthScope'
        rateLimit:
          $ref: '#/components/schemas/AgentRateLimit'
        expiresAt:
          type: [string, 'null']
          format: date-time
          description: Optional key expiry. Null means no scheduled expiry.
    AgentApiKeyRotateRequest:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          type: [string, 'null']
          format: date-time
          description: Optional replacement key expiry. Omit to preserve the previous expiry.
    AgentApiKeyResponse:
      type: object
      additionalProperties: false
      required: [data, availableActions]
      properties:
        data:
          type: object
          additionalProperties: false
          required:
            - id
            - apiKey
            - agent
            - scopes
            - rateLimit
            - status
            - createdAt
            - expiresAt
            - rotatedFromKeyId
            - availableActions
          properties:
            id:
              type: string
              pattern: '^akey_[A-Za-z0-9]+$'
            apiKey:
              type: string
              pattern: '^ar_live_[A-Za-z0-9_-]+$'
              description: Secret bearer key material. Returned only on create and rotate.
            agent:
              $ref: '#/components/schemas/AgentIdentity'
            scopes:
              type: array
              minItems: 1
              uniqueItems: true
              items:
                $ref: '#/components/schemas/AgentAuthScope'
            rateLimit:
              $ref: '#/components/schemas/AgentRateLimit'
            status:
              $ref: '#/components/schemas/AgentApiKeyStatus'
            createdAt:
              type: string
              format: date-time
            expiresAt:
              type: [string, 'null']
              format: date-time
            rotatedFromKeyId:
              type: [string, 'null']
              pattern: '^akey_[A-Za-z0-9]+$'
            availableActions:
              type: array
              items:
                type: string
                enum: [rotate, view_usage]
        availableActions:
          type: array
          items:
            type: string
            enum: [rotate, view_usage]
    AgentApiKeyUsageResponse:
      type: object
      additionalProperties: false
      required: [data, availableActions]
      properties:
        data:
          type: object
          additionalProperties: false
          required:
            - keyId
            - agent
            - status
            - lastUsedAt
            - totals
            - byScope
            - byOperation
            - rateLimit
            - availableActions
          properties:
            keyId:
              type: string
              pattern: '^akey_[A-Za-z0-9]+$'
            agent:
              $ref: '#/components/schemas/AgentIdentity'
            status:
              $ref: '#/components/schemas/AgentApiKeyStatus'
            lastUsedAt:
              type: [string, 'null']
              format: date-time
            totals:
              type: object
              additionalProperties: false
              required: [accepted, denied]
              properties:
                accepted:
                  type: integer
                  minimum: 0
                denied:
                  type: integer
                  minimum: 0
            byScope:
              type: array
              items:
                $ref: '#/components/schemas/AgentScopeUsage'
            byOperation:
              type: array
              items:
                $ref: '#/components/schemas/AgentOperationUsage'
            rateLimit:
              type: object
              additionalProperties: false
              required: [windowSeconds, maxRequests, currentWindow]
              properties:
                windowSeconds:
                  type: integer
                  minimum: 10
                  maximum: 3600
                maxRequests:
                  type: integer
                  minimum: 1
                  maximum: 10000
                currentWindow:
                  $ref: '#/components/schemas/AgentRateLimitWindow'
            availableActions:
              type: array
              items:
                type: string
                enum: [rotate]
        availableActions:
          type: array
          items:
            type: string
            enum: [rotate]
    AgentIdentity:
      type: object
      additionalProperties: false
      required: [id, displayName, role, externalIdentities]
      properties:
        id:
          type: string
          pattern: '^agt_[A-Za-z0-9_]+$'
        displayName:
          type: string
        role:
          type: string
          description: Product role used for attribution, not an authorization decision.
        externalIdentities:
          type: array
          description: Provider subjects used to attribute the same agent across adapters.
          items:
            $ref: '#/components/schemas/AgentExternalIdentity'
    AgentExternalIdentity:
      type: object
      additionalProperties: false
      required: [provider, subject]
      properties:
        provider:
          type: string
          examples: [github, linear]
        subject:
          type: string
    AgentAuthScope:
      type: string
      enum:
        - auth:admin
        - ci:read
        - events:read
        - routing:admin
        - routing:evaluate
        - routing:read
        - reviews:read
        - ship:write
        - tasks:read
        - tasks:write
        - usage:read
        - webhooks:read
        - webhooks:write
    AgentRateLimit:
      type: object
      additionalProperties: false
      required: [windowSeconds, maxRequests]
      properties:
        windowSeconds:
          type: integer
          minimum: 10
          maximum: 3600
          description: Fixed-window duration for one agent key.
        maxRequests:
          type: integer
          minimum: 1
          maximum: 10000
          description: Request budget for the window. Defaults should favor bursty agent work.
    AgentRateLimitWindow:
      type: object
      additionalProperties: false
      required: [startedAt, resetAt, used, remaining]
      properties:
        startedAt:
          type: string
          format: date-time
        resetAt:
          type: string
          format: date-time
        used:
          type: integer
          minimum: 0
        remaining:
          type: integer
          minimum: 0
    AgentApiKeyStatus:
      type: string
      enum: [active, rotated, revoked]
    AgentScopeUsage:
      type: object
      additionalProperties: false
      required: [scope, count]
      properties:
        scope:
          $ref: '#/components/schemas/AgentAuthScope'
        count:
          type: integer
          minimum: 0
    AgentOperationUsage:
      type: object
      additionalProperties: false
      required: [operation, count]
      properties:
        operation:
          type: string
        count:
          type: integer
          minimum: 0
    TaskSummary:
      type: object
      additionalProperties: false
      required: [id, identifier, title, status, priority, updatedAt, availableActions, blocker]
      properties:
        id:
          type: string
        identifier:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [todo, in_progress, in_review, blocked, done, cancelled]
        priority:
          type: string
          enum: [low, medium, high, critical]
        dueAt:
          type: [string, 'null']
          format: date-time
        updatedAt:
          type: string
          format: date-time
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
        blocker:
          anyOf:
            - type: 'null'
            - $ref: '#/components/schemas/TaskBlocker'
    TaskListResponse:
      type: object
      additionalProperties: false
      required: [data, page, availableActions, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'
        page:
          type: object
          additionalProperties: false
          required: [nextCursor, hasMore]
          properties:
            nextCursor:
              type: [string, 'null']
            hasMore:
              type: boolean
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    TaskDetail:
      type: object
      additionalProperties: false
      required:
        - id
        - identifier
        - title
        - description
        - status
        - priority
        - assignee
        - acceptanceCriteria
        - links
        - context
        - updatedAt
        - submissionId
        - prUrl
        - prNumber
        - branch
        - baseBranch
        - headSha
        - assigneeAgentId
        - triageQueueId
        - assignmentSource
        - routingDecisionId
        - routingReason
        - routingConfidence
        - availableActions
        - blocker
      properties:
        id:
          type: string
        identifier:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [todo, in_progress, in_review, blocked, done, cancelled]
        priority:
          type: string
          enum: [low, medium, high, critical]
        assignee:
          type: object
          additionalProperties: false
          required: [id, name]
          properties:
            id:
              type: string
            name:
              type: string
        acceptanceCriteria:
          type: array
          maxItems: 20
          items:
            type: string
        links:
          type: object
          additionalProperties: false
          required: [issue]
          properties:
            issue:
              type: string
              format: uri
            parentIssue:
              type: [string, 'null']
              format: uri
        context:
          type: object
          additionalProperties: false
          required: [project, goal]
          properties:
            project:
              type: [string, 'null']
            goal:
              type: string
        updatedAt:
          type: string
          format: date-time
        submissionId:
          type: [string, 'null']
          description: Latest AgentRail submission id when work has been submitted.
        prUrl:
          type: [string, 'null']
          format: uri
          description: Provider pull request URL from the latest submission.
        prNumber:
          type: [integer, 'null']
          description: Provider pull request number from the latest submission.
        branch:
          type: [string, 'null']
          description: Provider head branch for the latest submission.
        baseBranch:
          type: [string, 'null']
          description: Provider base branch for the latest submission.
        headSha:
          type: [string, 'null']
          description: Provider head commit SHA for the latest submission.
        assigneeAgentId:
          type: [string, 'null']
          description: Assigned AgentRail agent id, or null when routed to triage.
        triageQueueId:
          type: [string, 'null']
          description: Triage queue id when deterministic routing did not assign an agent.
        assignmentSource:
          type: [string, 'null']
          enum: [deterministic_rule, classifier, manual_triage, provider_assignee_mapping, null]
          description: Source of the current assignment decision.
        routingDecisionId:
          type: [string, 'null']
          description: Stable routing decision id for audit lookup.
        routingReason:
          anyOf:
            - type: 'null'
            - $ref: '#/components/schemas/TaskRoutingReason'
        routingConfidence:
          type: [number, 'null']
          minimum: 0
          maximum: 1
          description: Confidence score for the routing decision.
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
        blocker:
          anyOf:
            - type: 'null'
            - $ref: '#/components/schemas/TaskBlocker'
    TaskBlocker:
      type: object
      additionalProperties: false
      required: [kind, sourceRunId, sourceAgentId, reason, actionRequired, resumeInstructions, createdAt]
      properties:
        kind:
          type: string
          enum: [awaiting_user]
        sourceRunId:
          type: string
          pattern: '^run_[A-Za-z0-9_]+$'
        sourceAgentId:
          type: string
          pattern: '^agt_[A-Za-z0-9_]+$'
        reason:
          type: string
          minLength: 1
          maxLength: 500
        actionRequired:
          type: string
          minLength: 1
          maxLength: 2000
        resumeInstructions:
          type: string
          minLength: 1
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
    TaskBlockerRequest:
      type: object
      additionalProperties: false
      required: [sourceRunId, sourceAgentId, reason, actionRequired, resumeInstructions]
      properties:
        sourceRunId:
          type: string
          pattern: '^run_[A-Za-z0-9_]+$'
        sourceAgentId:
          type: string
          pattern: '^agt_[A-Za-z0-9_]+$'
        reason:
          type: string
          minLength: 1
          maxLength: 500
        actionRequired:
          type: string
          minLength: 1
          maxLength: 2000
        resumeInstructions:
          type: string
          minLength: 1
          maxLength: 2000
    TaskResolveBlockerRequest:
      type: object
      additionalProperties: false
      required: [resolutionSummary]
      properties:
        resolutionSummary:
          type: string
          minLength: 1
          maxLength: 2000
    TaskRoutingReason:
      type: object
      additionalProperties: false
      required: [summary, matchedRules, classifier, conflictReasons]
      properties:
        summary:
          type: string
          maxLength: 500
        matchedRules:
          type: array
          maxItems: 20
          items:
            type: object
            additionalProperties: false
            required: [id, name, confidence]
            properties:
              id:
                type: string
              name:
                type: string
              confidence:
                type: number
                minimum: 0
                maximum: 1
        classifier:
          anyOf:
            - type: 'null'
            - $ref: '#/components/schemas/TaskRoutingClassifierResult'
        conflictReasons:
          type: array
          maxItems: 20
          items:
            type: string
    TaskRoutingClassifierResult:
      type: object
      additionalProperties: false
      required: [provider, confidence, suggestedTarget]
      properties:
        provider:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        suggestedTarget:
          $ref: '#/components/schemas/TaskRoutingTarget'
    TaskRoutingTarget:
      type: object
      additionalProperties: false
      required: [type, id]
      properties:
        type:
          type: string
          enum: [agent, triage_queue]
        id:
          type: string
    TaskDetailResponse:
      type: object
      additionalProperties: false
      required: [data, availableActions, meta]
      properties:
        data:
          $ref: '#/components/schemas/TaskDetail'
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    TaskSubmitRequest:
      type: object
      additionalProperties: false
      required: [summary]
      properties:
        summary:
          type: string
          maxLength: 2000
        mode:
          type: string
          enum: [adapter_managed, artifact]
          default: adapter_managed
          description: |
            `adapter_managed` lets AgentRail's configured provider adapter create
            or reuse the pull request. `artifact` preserves deterministic local
            demos where the caller supplies the resulting artifact URL.
        pullRequest:
          type: object
          additionalProperties: false
          description: Optional provider PR hints for adapter-managed submit.
          properties:
            title:
              type: string
              maxLength: 300
            body:
              type: string
              maxLength: 10000
            head:
              type: string
              maxLength: 255
              description: Override the configured task source branch when needed.
            base:
              type: string
              maxLength: 255
              description: Override the configured target branch when needed.
            draft:
              type: boolean
            reviewers:
              type: array
              maxItems: 20
              items:
                type: string
        artifacts:
          type: array
          minItems: 1
          maxItems: 20
          description: Optional for adapter-managed submit; required only when you provide artifact-only submit metadata yourself.
          items:
            type: object
            additionalProperties: false
            required: [type, url]
            properties:
              type:
                type: string
                enum: [pull_request, commit, doc, ci_run, other]
              url:
                type: string
                format: uri
        checks:
          type: array
          maxItems: 20
          items:
            type: object
            additionalProperties: false
            required: [name, status]
            properties:
              name:
                type: string
              status:
                type: string
                enum: [passed, failed, running, skipped]
        notes:
          type: [string, 'null']
          maxLength: 2000
    TaskSubmissionResponse:
      type: object
      additionalProperties: false
      required: [data, availableActions]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [submissionId, taskId, status, acceptedAt, availableActions]
          properties:
            submissionId:
              type: string
            taskId:
              type: string
            status:
              type: string
              enum: [in_review]
            prUrl:
              type: string
              format: uri
              description: Provider PR URL when the submit adapter created or reused a PR.
            prNumber:
              type: integer
              description: Provider PR number when available.
            head:
              type: [string, 'null']
              description: Provider head branch for the created or reused PR.
            base:
              type: [string, 'null']
              description: Provider base branch for the created or reused PR.
            headSha:
              type: [string, 'null']
              description: Provider head commit SHA for the created or reused PR.
            action:
              type: string
              enum: [created, existing, accepted]
              description: Whether AgentRail created a PR, reused one, or accepted an artifact-only submission.
            idempotencyKey:
              type: string
            reviewRoute:
              type: object
              additionalProperties: false
              required: [participants]
              properties:
                participants:
                  type: array
                  maxItems: 10
                  items:
                    type: object
                    additionalProperties: false
                    required: [id, role]
                    properties:
                      id:
                        type: string
                      role:
                        type: string
            acceptedAt:
              type: string
              format: date-time
            availableActions:
              $ref: '#/components/schemas/AvailableActions'
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
    TaskCiStatusResponse:
      type: object
      additionalProperties: false
      required: [data, availableActions, meta]
      properties:
        data:
          type: object
          additionalProperties: false
          required:
            - taskId
            - submissionId
            - overallStatus
            - summary
            - workflows
            - checks
            - failureSummaries
            - flakyHints
            - updatedAt
            - availableActions
          properties:
            taskId:
              type: string
            submissionId:
              type: [string, 'null']
            overallStatus:
              type: string
              enum: [queued, running, passed, failed, cancelled]
            summary:
              type: object
              additionalProperties: false
              required: [total, passed, failed, running, queued, cancelled, skipped]
              properties:
                total:
                  type: integer
                  minimum: 0
                passed:
                  type: integer
                  minimum: 0
                failed:
                  type: integer
                  minimum: 0
                running:
                  type: integer
                  minimum: 0
                queued:
                  type: integer
                  minimum: 0
                cancelled:
                  type: integer
                  minimum: 0
                skipped:
                  type: integer
                  minimum: 0
            workflows:
              type: array
              maxItems: 20
              description: One compact summary per latest provider workflow.
              items:
                type: object
                additionalProperties: false
                required: [name, path, status, passed, failed, running, queued, cancelled, skipped, url]
                properties:
                  name:
                    type: string
                  path:
                    type: [string, 'null']
                  status:
                    type: string
                    enum: [queued, running, passed, failed, cancelled, skipped]
                  passed:
                    type: integer
                    minimum: 0
                  failed:
                    type: integer
                    minimum: 0
                  running:
                    type: integer
                    minimum: 0
                  queued:
                    type: integer
                    minimum: 0
                  cancelled:
                    type: integer
                    minimum: 0
                  skipped:
                    type: integer
                    minimum: 0
                  url:
                    type: [string, 'null']
                    format: uri
            checks:
              type: array
              maxItems: 50
              items:
                type: object
                additionalProperties: false
                required: [name, workflow, status, url, durationSeconds, failureCount]
                properties:
                  name:
                    type: string
                  workflow:
                    type: string
                  status:
                    type: string
                    enum: [queued, running, passed, failed, cancelled, skipped]
                  url:
                    type: [string, 'null']
                    format: uri
                  durationSeconds:
                    type: [integer, 'null']
                    minimum: 0
                  failureCount:
                    type: integer
                    minimum: 0
            failureSummaries:
              type: array
              maxItems: 5
              description: Parsed test failures only; raw logs are intentionally omitted.
              items:
                type: object
                additionalProperties: false
                required: [checkName, workflow, testName, file, line, message]
                properties:
                  checkName:
                    type: string
                  workflow:
                    type: string
                  testName:
                    type: string
                  file:
                    type: [string, 'null']
                  line:
                    type: [integer, 'null']
                    minimum: 1
                  message:
                    type: string
            flakyHints:
              type: array
              maxItems: 5
              description: Heuristics based on reruns or recent prior passes for the same check.
              items:
                type: object
                additionalProperties: false
                required: [checkName, confidence, reason]
                properties:
                  checkName:
                    type: string
                  confidence:
                    type: string
                    enum: [low, medium, high]
                  reason:
                    type: string
            updatedAt:
              type: [string, 'null']
              format: date-time
            availableActions:
              $ref: '#/components/schemas/AvailableActions'
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    CircleCiWebhookReceiptResponse:
      type: object
      additionalProperties: false
      required: [data, availableActions]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [accepted, deduplicated, matchedTasks]
          properties:
            accepted:
              type: boolean
            deduplicated:
              type: boolean
            matchedTasks:
              type: array
              items:
                type: string
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
    LinearIssueIntakeRequest:
      type: object
      additionalProperties: true
      required: [id, title]
      properties:
        id:
          type: string
          description: Linear issue UUID.
        identifier:
          type: string
          description: Human-readable Linear issue identifier, for example `ENG-123`.
        url:
          type: string
          format: uri
        title:
          type: string
        description:
          type: [string, 'null']
        priority:
          type: [integer, 'null']
          description: Linear numeric priority, where 1 is urgent and 4 is low.
        priorityLabel:
          type: [string, 'null']
          examples: [Urgent, High, Normal, Low]
        state:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
            name:
              type: string
            type:
              type: string
              description: Linear workflow state category.
              enum: [triage, backlog, unstarted, started, completed, canceled]
        team:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
            key:
              type: string
            name:
              type: string
        assignee:
          type: [object, 'null']
          additionalProperties: true
          properties:
            id:
              type: string
            name:
              type: string
        labels:
          description: |
            Linear labels. Accepts both direct array payloads and GraphQL-style
            connection objects with `nodes`.
          oneOf:
            - type: array
              description: Direct array of label objects.
              items:
                type: object
                additionalProperties: true
                properties:
                  name:
                    type: string
            - type: object
              description: GraphQL-style label connection object.
              additionalProperties: true
              properties:
                nodes:
                  type: array
                  description: GraphQL label node array.
                  items:
                    type: object
                    additionalProperties: true
                    properties:
                      name:
                        type: string
        workspace:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
            urlKey:
              type: string
    LinearIssueIntakeResponseEnvelope:
      type: object
      additionalProperties: false
      required: [data, availableActions]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [taskId, identifier, status, availableActions, createdAt]
          properties:
            taskId:
              type: string
              pattern: '^tsk_[A-Za-z0-9]+$'
            identifier:
              type: string
              examples: [linear:agentrail:issues/ENG-123]
            status:
              type: string
              enum: [todo, in_progress, in_review, blocked, done, cancelled]
            availableActions:
              $ref: '#/components/schemas/AvailableActions'
            createdAt:
              type: string
              format: date-time
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
    LinearWebhookRequest:
      type: object
      additionalProperties: true
      required: [action, type, data, webhookTimestamp]
      properties:
        action:
          type: string
          enum: [create, update, remove]
        type:
          type: string
          enum: [Issue, Comment]
        createdAt:
          type: string
          format: date-time
        webhookTimestamp:
          type: integer
          description: UNIX timestamp in milliseconds included by Linear for replay protection.
        data:
          type: object
          additionalProperties: true
          description: Linear entity snapshot. `Issue` events use the Linear issue shape; `Comment` events include comment fields such as `issueId` and `body`.
        updatedFrom:
          type: object
          additionalProperties: true
    LinearWebhookReceiptResponse:
      type: object
      additionalProperties: false
      required: [data, availableActions]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [matchedTasks, deduplicated, ignored, deliveryId, eventType]
          properties:
            matchedTasks:
              type: array
              items:
                type: string
                pattern: '^tsk_[A-Za-z0-9]+$'
            deduplicated:
              type: boolean
              description: True when the Linear delivery was already processed and the stored receipt was replayed.
            ignored:
              type: boolean
            deliveryId:
              type: [string, 'null']
            eventType:
              type: [string, 'null']
        availableActions:
          $ref: '#/components/schemas/AvailableActions'
    TaskReviewFeedbackResponse:
      type: object
      additionalProperties: false
      required: [data, availableActions]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [taskId, latestDecision, comments, availableActions]
          properties:
            taskId:
              type: string
            latestDecision:
              type: object
              additionalProperties: false
              required: [outcome, reviewer, createdAt, summary]
              properties:
                outcome:
                  type: string
                  enum: [approved, changes_requested, pending]
                reviewer:
                  type: object
                  additionalProperties: false
                  required: [id, role]
                  properties:
                    id:
                      type: string
                    role:
                      type: string
                createdAt:
                  type: string
                  format: date-time
                summary:
                  type: string
            comments:
              type: array
              maxItems: 100
              items:
                type: object
                additionalProperties: false
                required: [id, authorRole, body, severity]
                properties:
                  id:
                    type: string
                  authorRole:
                    type: string
                  body:
                    type: string
                  severity:
                    type: string
                    enum: [must_fix, should_fix, note]
            availableActions:
              $ref: '#/components/schemas/AvailableActions'
